version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/ilindan-dev/name-counter

linters:
  default: none

  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign

    - bodyclose
    - sqlclosecheck
    - rowserrcheck
    - copyloopvar
    - makezero
    - prealloc

    - gosec
    - gocritic
    - errorlint
    - nilerr
    - nilnil
    - revive
    - lll
    - gocyclo
    - gocognit
    - funlen
    - nestif

  settings:
    lll:
      line-length: 120
      tab-width: 4
    gocyclo:
      min-complexity: 10
    gocognit:
      min-complexity: 15
    nestif:
      min-complexity: 4
    funlen:
      lines: 70
      statements: 40

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

    revive:
      enable-default-rules: true
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true

  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - bodyclose
          - prealloc

issues:
  max-issues-per-linter: 0
  max-same-issues: 0